spring.application.name=fullstack-backend

# Database Configuration (loaded from .env with defaults)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:uni360}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:12345678}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Hibernate 7.x auto-detects the dialect - do not specify manually

# Server Configuration (loaded from .env with default)
server.port=${SERVER_PORT:8080}

# JWT Configuration (loaded from .env with defaults)
jwt.secret=${JWT_SECRET:dGhpc2lzYXZlcnlsb25nc2VjcmV0a2V5Zm9yand0YXV0aGVudGljYXRpb25zcHJpbmdib290YXBwbGljYXRpb24=}
jwt.expiration=${JWT_EXPIRATION:86400000}

# OTP SMS Configuration
# Use OTP_SMS_PROVIDER=twilio for real SMS, or log for development fallback
otp.sms.provider=${OTP_SMS_PROVIDER:log}
otp.sms.allow-log-fallback=${OTP_SMS_ALLOW_LOG_FALLBACK:true}
otp.sms.default-country-code=${OTP_SMS_DEFAULT_COUNTRY_CODE:+94}
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.phone-number=${TWILIO_PHONE_NUMBER:}

# Google Authentication
google.client-id=${GOOGLE_CLIENT_ID:}

# Logging Configuration
logging.level.com.example.fullstack_backend=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n