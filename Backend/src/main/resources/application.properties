spring.application.name=fullstack-backend

# Database Configuration (loaded from .env with defaults)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:PAFuni360}?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:12345678}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Hibernate 7.x auto-detects the dialect - do not specify manually

# Server Configuration (loaded from .env with default)
server.port=${SERVER_PORT:8080}

# JWT Configuration (loaded from .env with defaults)
jwt.secret=${JWT_SECRET:dGhpc2lzYXZlcnlsb25nc2VjcmV0a2V5Zm9yand0YXV0aGVudGljYXRpb25zcHJpbmdib290YXBwbGljYXRpb24=}
jwt.expiration=${JWT_EXPIRATION:86400000}

# OTP Email Configuration
# Use OTP_EMAIL_PROVIDER=smtp for real email, or log for development fallback
otp.email.provider=${OTP_EMAIL_PROVIDER:smtp}
otp.email.allow-log-fallback=${OTP_EMAIL_ALLOW_LOG_FALLBACK:true}
# Default from-address set to your Gmail. Can be overridden via OTP_EMAIL_FROM env var.
otp.email.from=${OTP_EMAIL_FROM:savinlabworks@gmail.com}

# SMTP Mail Configuration (used when OTP_EMAIL_PROVIDER=smtp)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
# Username must match your Gmail address (no extra spaces)
spring.mail.username=${MAIL_USERNAME:savinlabworks@gmail.com}
# For Gmail, use the App Password with NO spaces
